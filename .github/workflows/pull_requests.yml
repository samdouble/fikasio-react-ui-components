name: Checks
on: [pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Commitlint
        uses: wagoid/commitlint-github-action@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
      - name: Install
        run: |
          yarn
      - name: Lint
        run: |
          yarn lint
      - name: Tests
        run: |
          yarn test
      - name: Visual Regression Tests
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.0-37 libwoff1 libharfbuzz-icu0 \
            libgstreamer-plugins-base1.0-0 libgstreamer-gl1.0-0 libgstreamer1.0-0 \
            libegl1 libopus0 libxslt1.1 libgstreamer-plugins-bad1.0-0 \
            libgstreamer-plugins-good1.0-0 libvpx7 libenchant-2-2 libsecret-1-0 \
            libhyphen0 libmanette-0.2-0
          sudo apt-get install -y libevent-2.1.so.7 libflite.so.1 libflite_usenglish.so.1 \
            libflite_cmu_grapheme_lang.so.1 libflite_cmu_grapheme_lex.so.1 libflite_cmu_indic_lang.so.1 \
            libflite_cmu_indic_lex.so.1 libflite_cmulex.so.1 libflite_cmu_time_awb.so.1 libflite_cmu_us_awb.so.1 \
            libflite_cmu_us_kal16.so.1 libflite_cmu_us_kal.so.1 libflite_cmu_us_rms.so.1 libflite_cmu_us_slt.so.1 \
            libavif.so.13 libx264.so
          npx playwright install
          yarn test-ct
      - name: Build
        run: |
          yarn build
